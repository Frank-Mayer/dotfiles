#!/usr/bin/env bash

set -sg escape-time 40

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g terminal-overrides ',*:*:Tc'
set -g default-terminal "kitty"
set -s default-terminal "kitty"

# Nightfox colors for Tmux
# Style: nightfox
# Upstream: https://github.com/edeneast/nightfox.nvim/raw/main/extra/nightfox/nightfox_tmux.tmux
set -g mode-style "fg=#131a24,bg=#aeafb0"
set -g message-style "fg=#131a24,bg=#aeafb0"
set -g message-command-style "fg=#131a24,bg=#aeafb0"
set -g pane-border-style "fg=#aeafb0"
set -g pane-active-border-style "fg=#719cd6"
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#aeafb0,bg=#131a24"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-left "#[fg=#131a24,bg=#719cd6,bold] #S #[fg=#719cd6,bg=#131a24,nobold,nounderscore,noitalics]ÓÇ∞"
set -g status-right "#[fg=#131a24,bg=#131a24,nobold,nounderscore,noitalics]ÓÇ≤#[fg=#719cd6,bg=#131a24] #{prefix_highlight} #[fg=#aeafb0,bg=#131a24,nobold,nounderscore,noitalics]ÓÇ≤#[fg=#131a24,bg=#aeafb0] %Y-%m-%d ÓÇ≥ %I:%M %p #[fg=#719cd6,bg=#aeafb0,nobold,nounderscore,noitalics]ÓÇ≤#[fg=#131a24,bg=#719cd6,bold] #h "
setw -g window-status-activity-style "underscore,fg=#71839b,bg=#131a24"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#71839b,bg=#131a24"
setw -g window-status-format "#[fg=#131a24,bg=#131a24,nobold,nounderscore,noitalics]ÓÇ∞#[default] #I ÓÇ± #W #F #[fg=#131a24,bg=#131a24,nobold,nounderscore,noitalics]ÓÇ∞"
setw -g window-status-current-format "#[fg=#131a24,bg=#aeafb0,nobold,nounderscore,noitalics]ÓÇ∞#[fg=#131a24,bg=#aeafb0,bold] #I ÓÇ± #W #F #[fg=#aeafb0,bg=#131a24,nobold,nounderscore,noitalics]ÓÇ∞"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
